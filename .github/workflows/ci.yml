name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]   # tag pushes trigger the publish job
  pull_request:
jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: "https://registry.npmjs.org" }
      - run: npm install
      - run: npm test
      - run: npm run build
  publish:
    # npm TRUSTED PUBLISHING: OIDC exchange, no tokens anywhere. Configure on
    # npmjs.com → package/org → Trusted Publisher: repo pajama-studio/prefab-core,
    # workflow ci.yml. Publish = push a v* tag.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: "https://registry.npmjs.org" }
      - run: npm install -g npm@latest   # trusted publishing needs a recent npm
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
